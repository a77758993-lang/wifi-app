name: Build Android App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Buildozer
        uses: ArtemSvetlov/buildozer-action@v1
        with:
          command: buildozer -v android debug
          subfolder: .
      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: android-app
          path: bin/*.apk
